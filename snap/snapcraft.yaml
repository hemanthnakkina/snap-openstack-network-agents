name: openstack-network-agents
summary: OpenStack networking agents and helpers for OVS/OVN environments
description: |
  A unified snap that packages the networking agents and utilities needed
  to run OpenStack on hosts with Open vSwitch (OVS) and OVN.

  Currently provides:
    - OVS provider-bridge management: automatically creates bridges, attaches
      physical NICs, and configures OVN physnet mappings for external network
      connectivity.
    - NIC discovery: identifies candidate uplink interfaces, filtering out
      virtual devices and bond members.
    - A CLI for manual inspection and one-shot configuration
      (setup-bridge, show-bridge-setup, list-nics).

  The snap connects to MicroOVN via the ovn-chassis content interface and
  is typically driven by a Juju subordinate charm through snap configuration
  keys.
issues:
  - https://bugs.launchpad.net/snap-openstack-network-agents
source-code:
  - https://github.com/canonical/snap-openstack-network-agents
base: core24
version: "2025.1"
adopt-info: snap-version
license: Apache-2.0
grade: stable
confinement: strict

package-repositories:
  - type: apt
    cloud: epoxy
    priority: always

platforms:
  amd64:
  arm64:
  s390x:

plugs:
  network-control:
    interface: network-control
  network:
    interface: network
  ovn-chassis:
    interface: content
    target: $SNAP_DATA/microovn/chassis

apps:
  openstack-network-agents:
    environment:
      # Ensure site packages are loaded first
      PYTHONPATH: $SNAP/usr/lib/python3.12:$SNAP/usr/lib/python3.12/site-packages:$SNAP/lib/python3.12:$SNAP/lib/python3.12/site-packages:$SNAP/usr/lib/python3/dist-packages:$PYTHONPATH
    command: bin/openstack-network-agents
    plugs:
      - network
      - network-control
      - ovn-chassis
      - firewall-control

parts:
  snap-version:
    plugin: nil
    build-packages:
      - git
    override-build: |
      set -eu
      craftctl default
      gitref="$(git -C "$CRAFT_PROJECT_DIR" rev-parse --short=8 HEAD)"
      version="$(craftctl get version)-${gitref}"
      git -C "$CRAFT_PROJECT_DIR" update-index -q --refresh
      if ! git -C "$CRAFT_PROJECT_DIR" diff-index --quiet HEAD --; then
        version="${version}+dirty"
      fi
      craftctl set version="${version}"

  openstack-network-agents:
    plugin: python
    source: .
    build-snaps: [astral-uv]
    build-packages:
      - git
      - cargo
      - rustc
    stage-packages:
      - openvswitch-switch
    python-requirements:
      - requirements.txt
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
      snap-helpers write-hooks

hooks:
  install:
    plugs: [network, network-control, ovn-chassis, firewall-control]
  configure:
    plugs: [network, network-control, ovn-chassis, firewall-control]
